name: Bug Report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what you see
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version are you running? (shown in the sidebar and Settings > About)
      placeholder: e.g. 0.0.3
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15.4, Ubuntu 24.04
    validations:
      required: false
